services:
  api:
    build:
      context: ./backend/MedCure.Api
    container_name: medcure-api
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      MEDCURE_JWT_SECRET: ${MEDCURE_JWT_SECRET:?MEDCURE_JWT_SECRET must be set (min 32 chars)}
      ConnectionStrings__Default: Data Source=/data/medcure.db
      MedCure__AutoMigrate: "true"
    volumes:
      - medcure-data:/data
      - medcure-uploads:/app/wwwroot/uploads
    ports:
      - "5050:5050"
    restart: unless-stopped

  web:
    build:
      context: ./frontend/medcure-web
    container_name: medcure-web
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5050
      NEXT_PUBLIC_AI_URL: http://localhost:8100
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "3000:3000"
    restart: unless-stopped

  ai:
    build:
      context: ./backend/ai-assistant
    container_name: medcure-ai
    environment:
      MEDCURE_LLM_BACKEND: ${MEDCURE_LLM_BACKEND:-}
      MEDCURE_LLM_MODEL: ${MEDCURE_LLM_MODEL:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      MEDCURE_STT_BACKEND: ${MEDCURE_STT_BACKEND:-}
      MEDCURE_STT_MODEL: ${MEDCURE_STT_MODEL:-}
    ports:
      - "8100:8100"
    restart: unless-stopped

  kg:
    build:
      context: ./backend/knowledge-graph
    container_name: medcure-kg
    environment:
      MEDCURE_API_URL: http://api:5050
    depends_on:
      - api
    ports:
      - "8000:8000"
    restart: unless-stopped

volumes:
  medcure-data:
  medcure-uploads:
